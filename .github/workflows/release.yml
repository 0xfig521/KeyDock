# Build KeyDock for macOS and publish a GitHub Release with Tauri updater metadata.
# Triggered by pushing a tag like v0.2.0.
#
# Prerequisites:
#   1. Add the following secrets to GitHub:
#      - TAURI_PRIVATE_KEY   – contents of .tauri/key.pem
#      - TAURI_KEY_PASSWORD  – (empty here; set if you used a password)
#   2. Push a tag:  git tag v0.2.0 && git push origin v0.2.0

name: Release
on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS (universal)
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build universal macOS DMG
        run: bun run tauri build --target universal-apple-darwin --bundles dmg
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Collect artifacts
        id: artifacts
        shell: bash
        run: |
          DMG_DIR="src-tauri/target/universal-apple-darwin/release/bundle/dmg"
          DMG_FILE=$(ls "$DMG_DIR"/*.dmg 2>/dev/null | head -1)
          SIG_FILE="${DMG_FILE}.sig"

          if [ -z "$DMG_FILE" ]; then
            echo "::error::DMG not found in $DMG_DIR"
            exit 1
          fi

          echo "DMG=$DMG_FILE" >> "$GITHUB_OUTPUT"

          # Rename to a predictable name for the release asset
          mv "$DMG_FILE" "$DMG_DIR/KeyDock-universal.dmg"
          if [ -f "$SIG_FILE" ]; then
            mv "$SIG_FILE" "$DMG_DIR/KeyDock-universal.dmg.sig"
          fi
          echo "DMG=$DMG_DIR/KeyDock-universal.dmg" >> "$GITHUB_OUTPUT"

      - name: Generate update.json
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_DIR="src-tauri/target/universal-apple-darwin/release/bundle/dmg"
          SIG=$(cat "$DMG_DIR/KeyDock-universal.dmg.sig" 2>/dev/null || echo "")

          jq -n \
            --arg v "$VERSION" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg sig "$SIG" \
            --arg url "https://github.com/0xfig521/KeyDock/releases/download/${{ github.ref_name }}/KeyDock-universal.dmg" \
            '{
              version: $v,
              pub_date: $date,
              platforms: {
                "darwin-aarch64": { signature: $sig, url: $url },
                "darwin-x86_64": { signature: $sig, url: $url }
              }
            }' > update.json

          echo "update.json:"
          cat update.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/KeyDock-universal.dmg
            update.json
          generate_release_notes: true
