# Build KeyDock for macOS and publish a GitHub Release with Tauri updater metadata.
# Triggered by pushing a tag like v0.2.0.
#
# Prerequisites:
#   1. Add the following secrets to GitHub:
#      - TAURI_PRIVATE_KEY   – contents of .tauri/key.pem
#      - TAURI_KEY_PASSWORD  – (empty here; set if you used a password)
#   2. Push a tag:  git tag v0.2.0 && git push origin v0.2.0

name: Release
on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            crates/keydock-core
            crates/keydock-cli
          key: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build macOS DMG
        run: bun run tauri build --target aarch64-apple-darwin --bundles dmg
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          # Ad-hoc sign Apple Silicon builds so downloaded apps are not treated as damaged.
          # This is not Apple Developer ID signing/notarization; users may still need to allow the app in Privacy & Security.
          APPLE_SIGNING_IDENTITY: "-"
          # Tauri v2 DMG bundler checks CI env; this forces it to proceed
          TAURI_BUNDLER_DMG_IGNORE_CI: "true"

      - name: Collect artifacts
        id: artifacts
        shell: bash
        run: |
          # With --target, Tauri usually puts bundles under:
          #   target/<target>/release/bundle/
          # In Cargo workspaces the root target/ is used (not src-tauri/target/).
          for dir in \
            "target/aarch64-apple-darwin/release/bundle" \
            "target/release/bundle" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle" \
            "src-tauri/target/release/bundle" \
            "target" \
            "src-tauri/target"; do
            if [ -d "$dir" ]; then
              DMG_FILE=$(find "$dir" -maxdepth 4 -name "*.dmg" -type f -print 2>/dev/null | head -1)
              if [ -n "$DMG_FILE" ]; then
                echo "Found DMG: $DMG_FILE (in $dir)"
                break
              fi
            fi
          done

          if [ -z "$DMG_FILE" ]; then
            echo "::error::No DMG found under expected paths"
            echo "::group::Debug: target directory structure (top 100 dirs)"
            find target src-tauri/target -maxdepth 5 -type d 2>/dev/null | sort | head -100
            echo "::endgroup::"
            echo "::group::Debug: broad search for any .dmg files"
            find . -maxdepth 8 -name "*.dmg" -type f 2>/dev/null || echo "(none found)"
            echo "::endgroup::"
            exit 1
          fi

          echo "Found DMG: $DMG_FILE"
          DMG_DIR="$(dirname "$DMG_FILE")"
          SIG_FILE="${DMG_FILE}.sig"

          # Rename to a predictable name for the release asset
          mv "$DMG_FILE" "$DMG_DIR/KeyDock-aarch64.dmg"
          if [ -f "$SIG_FILE" ]; then
            mv "$SIG_FILE" "$DMG_DIR/KeyDock-aarch64.dmg.sig"
          fi

          echo "DMG=$DMG_DIR/KeyDock-aarch64.dmg" >> "$GITHUB_OUTPUT"
          echo "DMG_DIR=$DMG_DIR" >> "$GITHUB_OUTPUT"

      - name: Generate update.json
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_DIR="${{ steps.artifacts.outputs.DMG_DIR }}"
          SIG=$(cat "$DMG_DIR/KeyDock-aarch64.dmg.sig" 2>/dev/null || echo "")

          jq -n \
            --arg v "$VERSION" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg sig "$SIG" \
            --arg url "https://github.com/0xfig521/KeyDock/releases/download/${{ github.ref_name }}/KeyDock-aarch64.dmg" \
            '{
              version: $v,
              pub_date: $date,
              platforms: {
                "darwin-aarch64": { signature: $sig, url: $url }
              }
            }' > update.json

          echo "update.json:"
          cat update.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifacts.outputs.DMG }}
            update.json
          generate_release_notes: true
